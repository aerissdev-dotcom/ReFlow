<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReFlow - Companion</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <ul class="left-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="track.html">Track</a></li>
        </ul>
        <p><a href="index.html" class = "logo">REFLOW</a></p>
        <ul class="right-nav">
            <li><a href="ai.html">Companion</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>
    <div class="photo-container">
    <img src="assets/addiction.png" alt="addiction banner">
</div>
    <div class="first-box">
        <p class="description">
            This is a space to talk things through with your companion.
        </p>
    </div>
    <div class="second-box-ai">
        <div class="chat-container">
            <div class="chat-messages" id="chat-messages"></div>
            <div class="chat-typing" id="chat-typing" hidden>
                <span></span><span></span><span></span>
            </div>
            <form class="chat-form" id="chat-form">
                <input type="text" id="chat-input" placeholder="Type a message..." autocomplete="off" maxlength="500">
                <button type="submit" class="clean-btn">Send</button>
            </form>
            <button type="button" id="clear-btn" class="slip-btn">Clear conversation</button>
        </div>
    </div>
    <footer>
        &copy;&nbsp; <a href="https://github.com/aerissdev-dotcom" class="footer-a">Aeriss-Dev 2026</a>
    </footer>
    <script src="ai.js"></script>
</body>
</html>
