<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ReFlow - Track</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <ul class="left-nav">
            <li><a href="index.html">Home</a></li>
            <li><a href="track.html">Track</a></li>
        </ul>
        <p><a href="index.html" class = "logo">REFLOW</a></p>
        <ul class="right-nav">
            <li><a href="ai.html">Companion</a></li>
            <li><a href="about.html">About</a></li>
        </ul>
    </nav>
    <div class="photo-container">
    <img src="assets/addiction.png" alt="addiction banner">
</div>
    <div class="first-box">
        <p class="description">
            Each circle is a day, green means clean, empty means you slipped.
        </p>
        <div class="counter">
            <div>0 <span>DAYS</span></div>
            <div>0 <span>MINUTES</span></div>
            <div>0 <span>SECONDS</span></div>
        </div>
    </div>
    <div class="second-box">
        <div class="week-circles">
            <div class="circle filled"></div>
            <div class="circle filled"></div>
            <div class="circle filled"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
            <div class="circle"></div>
        </div>
        <div class="streak-info">
            <p class="streak-count">3 days clean</p>
            <p class="streak-total">12 total clean days</p>
        </div>
        <div class="action-buttons">
            <button class="slip-btn">I slipped</button>
        </div>
        <button class="impulse-btn" title = "Breathe for 60 seconds.">Impulse</button>
    </div>
    <footer>
        &copy;&nbsp; <a href="https://github.com/aerissdev-dotcom" class="footer-a">Aeriss-Dev 2026</a>
    </footer>
    <script src="script.js"></script>
</body>
</html>
